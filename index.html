<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Tracker - Hurstville</title>
    <meta name="description" content="Track rent payments and roommate contributions for Hurstville property">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%232563eb' d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🏠 Hurstville Rent Tracker</h1>
            <p class="subtitle">Weekly payment history & roommate contributions</p>
        </div>
    </header>

    <main class="container">
        <!-- Summary Cards -->
        <section class="summary-grid" id="summaryGrid">
            <!-- Populated by JavaScript -->
        </section>

        <!-- Controls -->
        <section class="controls">
            <div class="search-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Search by date..." aria-label="Search payments">
            </div>
            <div class="filter-group">
                <label for="monthFilter">Filter by Month:</label>
                <select id="monthFilter" aria-label="Filter by month">
                    <option value="all">All Months</option>
                </select>
            </div>
        </section>

        <!-- Payment Table -->
        <section class="table-container">
            <table class="payment-table" id="paymentTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Total Rent</th>
                        <th>I Paid</th>
                        <th>Roommate Paid</th>
                        <th>My Net</th>
                        <th>Roommate Paid On</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </section>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" hidden>
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <h3>No payments found</h3>
            <p>Try adjusting your search or filter criteria.</p>
        </div>
    </main>

    <footer class="footer">
        <p>Data source: Rent for Hurstville.xlsx • Last updated: 2026</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
